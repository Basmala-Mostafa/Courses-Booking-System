<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Course Booking</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: #f2f4f8;
        }

        header {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            padding: 25px;
            color: white;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 30px;
        }

        .contact-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .contact-card {
            background: white;
            width: 500px;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .contact-card h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #1e3c72;
        }

        .contact-card p {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
            font-family: 'Cairo', sans-serif;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        input:focus, textarea:focus {
            border-color: #2a5298;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #1e3c72;
            color: white;
            font-size: 13px;
        }
    </style>
</head>

<body>

<header>
    <h1>Contact Us</h1>
    <p>Beni-Suef Technological University</p>
</header>

<div class="contact-container">
    <div class="contact-card">
        <h2>Get in Touch</h2>
        <p>If you have any questions, feel free to contact us</p>

        <label>Full Name</label>
        <input type="text" placeholder="Enter your name">

        <label>Email</label>
        <input type="email" placeholder="Enter your email">

        <label>Message</label>
        <textarea placeholder="Write your message here..."></textarea>

        <button>Send Message</button>
    </div>
</div>

<footer>
    © 2025 Technological University Courses – Practical Project
</footer>

</body>
</html>
