<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password | Course Booking</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .forgot-card {
            background: white;
            width: 360px;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            text-align: center;
        }

        .forgot-card h2 {
            margin-bottom: 10px;
            color: #1e3c72;
            font-size: 26px;
        }

        .forgot-card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        label {
            display: block;
            text-align: left;
            font-size: 14px;
            margin-bottom: 5px;
            color: #444;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: #2a5298;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }

        .links {
            margin-top: 20px;
            font-size: 13px;
        }

        .links a {
            color: #2a5298;
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>

<body>

    <div class="forgot-card">
        <h2>Forgot Password</h2>
        <p>
            Enter your email or student ID  
            and we will send you instructions  
            to reset your password.
        </p>

        <label>Email / Student ID</label>
        <input type="text+" placeholder="Enter your email or ID">

        <button>Reset Password</button>

        <div class="links">
            <a href="login.html">Back to Login</a>
        </div>

        <div class="footer-text">
            Beni-Suef Technological University
        </div>
    </div>

</body>
</html>
